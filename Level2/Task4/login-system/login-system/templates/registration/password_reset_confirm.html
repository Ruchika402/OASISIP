{% extends 'base.html' %}


{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Set New Password</h2>
        {% if validlink %}
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-primary" style="margin-top: 1rem;">Change Password</button>
            </form>
        {% else %}
            <div class="alert">
                The password reset link was invalid, possibly because it has already been used. Please request a new password reset.
            </div>
            <a href="{% url 'password_reset' %}" class="btn-primary" style="text-decoration:none; display:inline-block; margin-top: 1rem;">Request Reset</a>
        {% endif %}
    </div>
</div>
{% endblock %}
