{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        
        <form method="POST">
            {% csrf_token %}

            {% if form.errors %}
            <div class="alert">
                Your username and password didn't match. Please try again.
            </div>
            {% endif %}
            
            <div class="input-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" placeholder="Enter username" required autofocus>
            </div>

            <div class="input-group">
                <label for="id_password">Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="id_password" placeholder="Enter password" required>
                    <i class="fas fa-eye" id="togglePassword"></i>
                </div>
            </div>

            <div class="form-footer">
                <a href="{% url 'password_reset' %}">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-primary">Login</button>
            <p>New user? <a href="{% url 'signup' %}">Create account</a></p>
        </form>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#id_password');

    togglePassword.addEventListener('click', function (e) {
        // Toggle the type attribute
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        
        // Toggle the eye icon
        this.classList.toggle('fa-eye-slash');
    });
</script>
{% endblock %}
