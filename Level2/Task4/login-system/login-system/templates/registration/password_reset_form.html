{% extends 'base.html' %}


{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Reset Password</h2>
        <p style="text-align: center; font-size: 0.9rem; margin-bottom: 1.5rem;">Enter your email address and we'll send you a link to reset your password.</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary" style="margin-top: 1rem;">Send Reset Link</button>
        </form>
    </div>
</div>
{% endblock %}
