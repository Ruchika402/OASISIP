{% extends 'base.html' %}


{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary" style="margin-top: 1rem;">Sign Up</button>
            <p>Already have an account? <a href="{% url 'login' %}">Login here</a></p>
        </form>
    </div>
</div>
{% endblock %}
